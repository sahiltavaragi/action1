<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AgriAuction{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div style="position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:999;width:90%;max-width:480px;">
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" style="margin-bottom:0.5rem;">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block body %}{% endblock %}
</body>
</html>
